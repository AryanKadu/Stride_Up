{% extends 'base.html' %}
{% block title %}Update Exercise{% endblock %}

{% block content %}

<style>
    /* Update Exercise - Dark Neon Theme */

/* Heading */
h2 {
  font-size: 2.5rem;
  color: #0dfa05;
  text-align: center;
  margin-top: 30px;
  margin-bottom: 30px;
  text-shadow: 0 0 10px #0dfa05;
}

/* Form Container */
form {
  background-color: #1a1a1a;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(13, 250, 5, 0.3);
  border: 1px solid #0dfa05;
  color: #fff;
}

/* Form Fields */
form label {
  color: #0dfa05;
  font-weight: bold;
  text-shadow: 0 0 5px #0dfa05;
}

form input,
form textarea,
form select {
  background-color: #121212;
  color: #fff;
  border: 1px solid #0dfa05;
  padding: 10px;
  margin-bottom: 15px;
  width: 100%;
  border-radius: 6px;
  box-shadow: 0 0 5px #0dfa05;
}

form input:focus,
form textarea:focus,
form select:focus {
  outline: none;
  border-color: #0dfa05;
  box-shadow: 0 0 10px #0dfa05;
}

/* Buttons */
.btn-primary {
  background-color: transparent;
  border: 2px solid #0dfa05;
  color: #0dfa05;
  transition: all 0.3s ease;
  margin-right: 10px;
}

.btn-primary:hover {
  background-color: #0dfa05;
  color: #000;
  box-shadow: 0 0 10px #0dfa05;
}

.btn-secondary {
  background-color: #2c2c2c;
  border: 2px solid #888;
  color: #ccc;
  transition: all 0.3s ease;
}

.btn-secondary:hover {
  background-color: #444;
  color: #fff;
  box-shadow: 0 0 5px #888;
}

/* Responsive Tweaks */
@media (max-width: 768px) {
  h2 {
    font-size: 2rem;
  }

  .btn-primary, .btn-secondary {
    width: 100%;
    margin-bottom: 10px;
  }
}

</style>

<main>
<div class="container">
    <h2>Update Exercise</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="btn btn-primary">Update Exercise</button>
        <a href="{% url 'workouts:workout_detail' exercise.workout.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</main>
{% endblock %}
