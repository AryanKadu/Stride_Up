{% extends 'base.html' %}
{% block title %}Delete Exercise{% endblock %}

{% block content %}
<main>

<div class="container">
    <h2>Delete Exercise</h2>
    <p>Are you sure you want to delete "{{ object.name }}"?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'workouts:workout_detail' object.workout.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</main>
{% endblock %}
