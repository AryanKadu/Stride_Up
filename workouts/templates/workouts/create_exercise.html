{% extends 'base.html' %}
{% block title %}Add Exercise{% endblock %}

{% block content %}

<style>
/* Glowing green button */
.btn-glow-green {
  background-color: #0dfa05;
  color: #000;
  font-weight: bold;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  box-shadow: 0 0 15px #0dfa05;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-glow-green:hover {
  background-color: #0cc204;
  box-shadow: 0 0 25px #0dfa05, 0 0 40px #0dfa05;
}

/* Outline style for back link */
.btn-outline {
  display: inline-block;
  padding: 8px 16px;
  color: #0dfa05;
  border: 1px solid #0dfa05;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 500;
  transition: all 0.3s ease;
}

.btn-outline:hover {
  background-color: #0dfa05;
  color: #000;
  box-shadow: 0 0 12px #0dfa05;
}

/* Form field styling */
form input, form select, form textarea {
  width: 100%;
  background-color: #0d0d0d;
  border: 1px solid #0dfa05;
  color: #fff;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 1rem;
  box-shadow: 0 0 5px rgba(13, 250, 5, 0.2);
}

form input:focus, form select:focus, form textarea:focus {
  outline: none;
  box-shadow: 0 0 12px #0dfa05;
  border-color: #0dfa05;
}

form label {
  font-weight: 500;
  margin-bottom: 6px;
  display: block;
  color: #0dfa05;
  text-shadow: 0 0 4px #0dfa05;
}
</style>

<main>
  <div class="container mt-5">
    <h2 class="text-success fw-bold">Add Exercise to {{ workout.name }}</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-glow-green">Add Exercise</button>
      <a href="{% url 'workouts:workout_detail' workout.pk %}" class="btn-outline ms-2">Cancel</a>
    </form>
  </div>
</main>

{% endblock %}
